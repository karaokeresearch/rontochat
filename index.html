<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rontochat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #111;
      background: #fff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f5f5f4;
    }

    #app {
      width: 100%;
      max-width: 680px;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 0 0 1px #e7e5e4;
    }

    /* header */
    #header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #header strong { font-size: 15px; }

    #status {
      color: #999;
      font-size: 12px;
      cursor: default;
      position: relative;
    }

    #status[data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #222;
      color: #fff;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.5;
      width: 210px;
      white-space: normal;
      z-index: 10;
      pointer-events: none;
    }

    #clear {
      background: none;
      border: 1px solid #ddd;
      color: #555;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      padding: 3px 10px;
      border-radius: 4px;
    }
    #clear:hover { background: #f5f5f4; border-color: #bbb; color: #111; }

    #github-link { color: #999; font-size: 12px; text-decoration: none; }
    #github-link:hover { color: #111; }

    #error-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: #999;
      font-size: 13px;
      padding: 2rem;
      text-align: center;
      line-height: 1.6;
    }
    #error-screen strong { color: #111; font-size: 15px; }

    /* messages */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row {
      display: flex;
    }

    .row.user { justify-content: flex-end; }
    .row.ai   { justify-content: flex-start; }

    .bubble {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 16px;
      line-height: 1.5;
      word-break: break-word;
    }

    .row.user .bubble { background: #111; color: #fff; border-bottom-right-radius: 4px; }
    .row.ai   .bubble { background: #f0f0f0; color: #111; border-bottom-left-radius: 4px; }

    /* markdown */
    .bubble p        { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin: 0 0 8px; padding-left: 20px; }
    .bubble li       { margin-bottom: 2px; }
    .bubble strong   { font-weight: 600; }
    .bubble em       { font-style: italic; }
    .bubble a        { color: inherit; text-decoration: underline; }
    .bubble code     { font-family: ui-monospace, monospace; font-size: 12px; background: rgba(0,0,0,0.08); padding: 1px 4px; border-radius: 3px; }
    .bubble pre      { background: rgba(0,0,0,0.06); border-radius: 6px; padding: 10px 12px; margin: 6px 0; overflow-x: auto; }
    .bubble pre code { background: none; padding: 0; font-size: 12px; }

    /* composer */
    #composer {
      border-top: 1px solid #eee;
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 8px 14px;
      font: inherit;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
    }

    #input:focus { border-color: #aaa; }
    #input:disabled { opacity: 0.4; }

    #btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>
<div id="app">

<div id="header">
  <strong>rontochat</strong>
  <div style="display:flex;align-items:center;gap:12px">
    <button id="clear">clear</button>
    <span id="status">loading…</span>
    <span style="color:#ddd">|</span>
    <a id="github-link" href="https://github.com/karaokeresearch/rontochat" target="_blank" rel="noopener">view on GitHub</a>
  </div>
</div>

<div id="log"></div>

<div id="composer">
  <textarea id="input" rows="1" placeholder="Message…" disabled></textarea>
  <button id="btn" disabled>↑</button>
</div>

<script>
  function renderMarkdown(raw) {
    const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // 1. Extract fenced code blocks before escaping
    const blocks = [];
    let text = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      blocks.push(`<pre><code>${esc(code.trimEnd())}</code></pre>`);
      return `\x02BLOCK${blocks.length - 1}\x02`;
    });

    // 2. Escape remaining HTML
    text = esc(text);

    // 3. Inline elements
    text = text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // 4. Block elements (line by line)
    const lines = text.split('\n');
    const out = [];
    let ul = false, ol = false;

    for (const line of lines) {
      const uMatch = line.match(/^[*\-] (.+)/);
      const oMatch = line.match(/^\d+\. (.+)/);
      if (uMatch) {
        if (ol) { out.push('</ol>'); ol = false; }
        if (!ul) { out.push('<ul>'); ul = true; }
        out.push(`<li>${uMatch[1]}</li>`);
      } else if (oMatch) {
        if (ul) { out.push('</ul>'); ul = false; }
        if (!ol) { out.push('<ol>'); ol = true; }
        out.push(`<li>${oMatch[1]}</li>`);
      } else {
        if (ul) { out.push('</ul>'); ul = false; }
        if (ol) { out.push('</ol>'); ol = false; }
        out.push(line);
      }
    }
    if (ul) out.push('</ul>');
    if (ol) out.push('</ol>');

    // 5. Wrap paragraph blocks
    text = out.join('\n').split(/\n\n+/).map(block => {
      block = block.trim();
      if (!block) return '';
      if (/^<(ul|ol|pre)/.test(block) || block.startsWith('\x02BLOCK')) return block;
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).filter(Boolean).join('');

    // 6. Restore code blocks
    return text.replace(/\x02BLOCK(\d+)\x02/g, (_, i) => blocks[+i]);
  }

  const log    = document.getElementById('log');
  const input  = document.getElementById('input');
  const btn    = document.getElementById('btn');
  const status = document.getElementById('status');
  const clear  = document.getElementById('clear');

  const STORAGE_KEY = 'rontochat_history';
  let history = [];
  let session = null;
  let busy    = false;

  function saveHistory() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
  }

  function loadStoredHistory() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  // render = true → apply markdown to ai bubbles (used when restoring or finalising)
  function addBubble(role, text, render = false) {
    const row    = document.createElement('div');
    row.className = 'row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (render && role === 'ai') bubble.innerHTML = renderMarkdown(text);
    else bubble.textContent = text;
    row.appendChild(bubble);
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return bubble;
  }

  clear.addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    history = [];
    log.innerHTML = '';
    // recreate session to reset its context too
    if (session) { session.destroy(); session = null; }
    initSession();
  });

  async function send() {
    const text = input.value.trim();
    if (!text || !session || busy) return;

    busy = true;
    input.disabled = true;
    btn.disabled   = true;
    input.value    = '';
    input.style.height = 'auto';

    addBubble('user', text, true);
    const reply = addBubble('ai', '…');

    let accumulated = '';
    try {
      const stream = session.promptStreaming(text);
      for await (const chunk of stream) {
        accumulated += chunk;
        reply.innerHTML = renderMarkdown(accumulated);
        log.scrollTop = log.scrollHeight;
      }
    } catch (e) {
      reply.textContent = 'Error: ' + e.message;
    }

    if (accumulated) {
      history.push({ role: 'user', text });
      history.push({ role: 'ai', text: accumulated });
      saveHistory();
    }

    busy = false;
    input.disabled = false;
    btn.disabled   = false;
    input.focus();
  }

  btn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });

  async function initSession() {
    input.disabled = true;
    btn.disabled   = true;
    try {
      const initialPrompts = history.slice(-20).map(m => ({
        role: m.role === 'user' ? 'user' : 'assistant',
        content: m.text,
      }));
      session = await LanguageModel.create({
        initialPrompts,
        monitor(m) {
          m.addEventListener('downloadprogress', e => {
            status.textContent = `downloading… ${Math.round(e.loaded / e.total * 100)}%`;
          });
        }
      });
      status.textContent = 'local model: Gemini Nano';
      status.dataset.tooltip = 'This model runs entirely on the 4GB LLM your browser provider downloaded to your local computer without your permission 😜. So, no Internet connection is needed. Try disconnecting your Wi-Fi... It still works!';
      input.disabled = false;
      btn.disabled   = false;
      input.focus();
    } catch (e) {
      status.textContent = 'error: ' + e.message;
    }
  }

  function showError(title, detail) {
    log.innerHTML = '';
    const el = document.createElement('div');
    el.id = 'error-screen';
    el.innerHTML = `<strong>${title}</strong><span>${detail}</span>`;
    log.appendChild(el);
  }

  async function init() {
    if (!('LanguageModel' in window)) {
      showError(
        'Browser not supported',
        'rontochat requires the Chrome Prompt API, available in Chrome 138+ with AI features enabled. Try opening chrome://flags and enabling "Prompt API for Gemini Nano".'
      );
      status.textContent = 'unsupported';
      return;
    }
    try {
      const avail = await LanguageModel.availability();
      if (avail === 'unavailable') {
        showError(
          'Model unavailable',
          'Your device doesn\'t meet the requirements for on-device AI (16 GB RAM, 22 GB free storage, and a supported GPU are needed).'
        );
        status.textContent = 'unavailable';
        return;
      }
      status.textContent = avail === 'downloadable' ? 'downloading…' : 'loading…';
    } catch (e) {
      status.textContent = 'error: ' + e.message;
      return;
    }
    history = loadStoredHistory();
    for (const msg of history) addBubble(msg.role, msg.text, true);
    await initSession();
  }

  init();
</script>
</div>
</body>
</html>
