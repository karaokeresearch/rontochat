<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blue Period</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ronto.chat/mbp">
  <meta property="og:title" content="My Blue Period">
  <meta property="og:description" content="A pretentious procedural painter living in your browser. Uses the the 4GB LLM Chrome downloaded onto your computer without your consent.">
  <meta property="og:image" content="https://ronto.chat/mbp/preview.png">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://ronto.chat/mbp">
  <meta name="twitter:title" content="My Blue Period">
  <meta name="twitter:description" content="A pretentious procedural painter living in your browser. Uses the the 4GB LLM Chrome downloaded onto your computer without your consent.">
  <meta name="twitter:image" content="https://ronto.chat/mbp/preview.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #efefef;
      color: #d4d4d4;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    .pills {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      overflow: hidden;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      white-space: nowrap;
    }
    .pill-label {
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pill-val { color: rgba(255,255,255,0.75); }

    /* movement pill is wider to show long names */
    .pill-movement { max-width: 280px; overflow: hidden; }
    .pill-movement .pill-val {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #statusMsg {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      font-style: italic;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.65);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: rgba(255,255,255,0.12); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Gallery ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
      padding: 2px;
      padding-bottom: 100vh;
    }

    .cell {
      aspect-ratio: 1;
      overflow: hidden;
      background: white;
      position: relative;
      cursor: pointer;
    }

    .cell svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cell:hover {
      z-index: 5;
      outline: 2px solid rgba(0,0,0,0.25);
    }

    /* Loading shimmer */
    .cell.loading {
      background: #c4c4c4;
    }
    .cell.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        100deg,
        rgba(255,255,255,0)   20%,
        rgba(255,255,255,0.5) 50%,
        rgba(255,255,255,0)   80%
      );
      background-size: 200% 100%;
      animation: shimmer 1.8s infinite;
    }
    @keyframes shimmer {
      0%   { background-position:  200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Boot overlay */
    #bootMsg {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
      z-index: 10;
    }
    #bootMsg.hidden { display: none; }
    .boot-dot-row {
      display: flex;
      gap: 10px;
    }
    .boot-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #999;
      animation: bootpulse 1.2s ease-in-out infinite;
    }
    .boot-dot:nth-child(2) { animation-delay: 0.2s; }
    .boot-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bootpulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }
    .boot-label {
      font-size: 12px;
      color: rgba(0,0,0,0.3);
      font-style: italic;
      letter-spacing: 0.03em;
    }

    /* Newly filled — fade in */
    .cell:not(.loading):not(.error) {
      animation: fadein 0.4s ease-out;
    }
    @keyframes fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Error cell */
    .cell.error {
      background: rgba(180,30,30,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      font-size: 9px;
      color: rgba(255,100,100,0.6);
      text-align: center;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Tooltip ── */
    .tooltip {
      position: fixed;
      z-index: 200;
      pointer-events: none;
      width: 290px;
      background: rgba(8,8,8,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
    }
    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #ttMovement {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 4px;
    }

    #ttMeta {
      font-size: 10px;
      color: rgba(255,255,255,0.22);
      margin-bottom: 4px;
    }

    #ttOutlook {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      font-style: italic;
      margin-bottom: 10px;
    }

    #ttStatement {
      font-size: 12.5px;
      line-height: 1.6;
      color: rgba(255,255,255,0.82);
      font-style: italic;
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }
    .lb-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.88);
    }
    .lb-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .lb-svg-wrap {
      position: relative;
      width: min(65vh, 55vw);
      height: min(65vh, 55vw);
      background: white;
      border-radius: 4px;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 12px 64px rgba(0,0,0,0.6);
    }
    .lb-svg-wrap svg {
      display: block;
      position: absolute;
      inset: -1px;
      width: calc(100% + 2px);
      height: calc(100% + 2px);
    }
    .lb-info {
      color: white;
      width: 230px;
      height: min(65vh, 55vw);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }
    .lb-movement-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 4px;
    }
    .lb-movement-name {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      color: white;
    }
    .lb-outlook {
      font-size: 11px;
      color: rgba(255,255,255,0.38);
      font-style: italic;
      margin-top: 6px;
    }
    .lb-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
    }
    .lb-statement {
      font-size: 13px;
      line-height: 1.7;
      color: rgba(255,255,255,0.8);
      font-style: italic;
      border-left: 2px solid rgba(255,255,255,0.15);
      padding-left: 14px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    .lb-close {
      position: absolute;
      top: -44px;
      right: 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      padding: 0;
    }
    .lb-close:hover { background: rgba(255,255,255,0.18); color: white; }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
      font-size: 32px;
      cursor: pointer;
      width: 48px;
      height: 64px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, color 0.15s;
      z-index: 2;
      line-height: 1;
    }
    .lb-nav:hover:not(:disabled) { background: rgba(255,255,255,0.15); color: white; }
    .lb-nav:disabled { opacity: 0.15; cursor: default; }
    .lb-prev { left: 16px; }
    .lb-next { right: 16px; }
  </style>
</head>
<body>

  <header>
    <h1>My Blue Period</h1>

    <div class="pills">
      <div class="pill pill-movement">
        <span class="pill-label">movement</span>
        <span class="pill-val" id="pillMovement">—</span>
      </div>
      <div class="pill">
        <span class="pill-label">piece</span>
        <span class="pill-val" id="pillPiece">—</span>
      </div>
      <div class="pill">
        <span class="pill-label">gen</span>
        <span class="pill-val" id="pillGen">0</span>
      </div>
    </div>

    <span id="statusMsg">Starting...</span>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="clearBtn">Clear</button>
  </header>

  <div class="gallery" id="gallery"></div>

  <div id="bootMsg">
    <div class="boot-dot-row">
      <div class="boot-dot"></div>
      <div class="boot-dot"></div>
      <div class="boot-dot"></div>
    </div>
    <div class="boot-label" id="bootLabel">Waking up…</div>
  </div>

  <div class="tooltip" id="tooltip">
    <div id="ttMovement"></div>
    <div id="ttMeta"></div>
    <div id="ttStatement"></div>
  </div>

  <div class="lightbox" id="lightbox">
    <div class="lb-backdrop" id="lbBackdrop"></div>
    <div class="lb-content">
      <div class="lb-svg-wrap" id="lbSvg"></div>
      <div class="lb-info">
        <div>
          <div class="lb-movement-label" id="lbMovLabel"></div>
          <div class="lb-movement-name" id="lbMovName"></div>
        </div>
        <div class="lb-meta" id="lbMeta"></div>
        <div class="lb-statement" id="lbStatement"></div>
      </div>
      <button class="lb-close" id="lbClose">✕</button>
      <button class="lb-nav lb-prev" id="lbPrev">‹</button>
      <button class="lb-nav lb-next" id="lbNext">›</button>
    </div>
  </div>

  <script src="artist.js"></script>
</body>
</html>
